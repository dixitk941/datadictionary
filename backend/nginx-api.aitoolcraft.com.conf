# ── api.aitoolcraft.com ──────────────────────────────────────────────────────
# Drop this file at: /etc/nginx/sites-available/api.aitoolcraft.com
# Then: ln -s /etc/nginx/sites-available/api.aitoolcraft.com \
#             /etc/nginx/sites-enabled/api.aitoolcraft.com
# This file is ISOLATED — it does not touch any other site blocks.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name api.aitoolcraft.com;

    # Certbot will add SSL lines here automatically when you run:
    # certbot --nginx -d api.aitoolcraft.com
    # Until then, HTTP works fine behind Cloudflare (CF handles HTTPS).

    location / {
        proxy_pass         http://127.0.0.1:8432;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep-alive to uvicorn workers
        proxy_set_header   Connection        "";

        # Timeouts – AI summary can take a few seconds
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Upload size (for connection payloads)
        client_max_body_size 2M;
    }

    # Health probe – nginx itself can answer quickly
    location = /api/health {
        proxy_pass http://127.0.0.1:8432/api/health;
    }
}
