# ── aitoolcraft.com (frontend — React SPA static files) ─────────────────────
# Drop at: /etc/nginx/sites-available/aitoolcraft.com
# Symlink:  ln -s /etc/nginx/sites-available/aitoolcraft.com \
#                 /etc/nginx/sites-enabled/aitoolcraft.com
# Isolated — does NOT touch any other site config.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name aitoolcraft.com www.aitoolcraft.com;

    root /var/www/datadictionary/frontend/dist;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/x-javascript text/xml
        application/xml image/svg+xml;

    # ── SPA routing — all unknown paths fall back to index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must never be cached (so new deploys are picked up)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Hashed assets — cache forever (Vite adds content hash to filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Certbot will append SSL block here automatically ─────────────────────
    # certbot --nginx -d aitoolcraft.com -d www.aitoolcraft.com
}
